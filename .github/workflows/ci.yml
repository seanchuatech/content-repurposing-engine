name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]  # Also run on pushes to main (before deploy)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Server (Bun / TypeScript) ────────────────────────────────────────────────
  ci-server:
    name: Server — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check (server)
        working-directory: server
        run: bun run tsc --noEmit

      - name: Type check (shared-types)
        working-directory: packages/shared-types
        run: bun run tsc --noEmit
        continue-on-error: true

  # ── Client (Vite / React) ────────────────────────────────────────────────────
  ci-client:
    name: Client — Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (validate no compile errors)
        working-directory: client
        env:
          # Use a placeholder so Vite doesn't fail on missing env vars at build time
          VITE_API_URL: https://studio.leonardseanchua.dev
        run: bun run build

  # ── Worker (Python / uv) ─────────────────────────────────────────────────────
  ci-worker:
    name: Worker — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install Python dependencies
        working-directory: workers
        run: uv sync --frozen

      - name: Lint with Ruff
        working-directory: workers
        run: uv run ruff check .

      - name: Type check with Pyright
        working-directory: workers
        run: uv run pyright .

  # ── Docker Build Validation ───────────────────────────────────────────────────
  ci-docker:
    name: Docker — Build Validation
    runs-on: ubuntu-latest
    # Only run on PRs to avoid slowing down main branch CI
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          tags: content-engine-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./workers
          file: ./workers/Dockerfile
          push: false
          tags: content-engine-worker:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
