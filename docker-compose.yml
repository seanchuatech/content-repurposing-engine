version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: content-engine-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - content-engine-net
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    container_name: content-engine-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - content-engine-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: content-engine-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/content_engine
      - REDIS_URL=redis://redis:6379
      - STORAGE_BACKEND=local
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - content-engine-net

  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: content-engine-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SERVER_URL=http://server:3000/api
      - LLM_BACKEND=gemini
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
      - server
    networks:
      - content-engine-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: content-engine-client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - content-engine-net

  db-ui:
    image: adminer
    container_name: content-engine-db-ui
    restart: always
    ports:
      - "8081:8080"
    networks:
      - content-engine-net

networks:
  content-engine-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
