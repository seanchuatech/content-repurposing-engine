version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: content-engine-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - content-engine-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: content-engine-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/content_engine
      - STORAGE_BACKEND=local
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - content-engine-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: content-engine-client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - content-engine-net

  db-ui:
    image: adminer
    container_name: content-engine-db-ui
    restart: always
    ports:
      - "8081:8080"
    networks:
      - content-engine-net

networks:
  content-engine-net:
    driver: bridge

volumes:
  postgres_data:
